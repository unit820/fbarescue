<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Message Sent | Seller Rescue</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0A192F;--gold:#F4A900;--white:#FFFFFF;--charcoal:#1A1A2E;--gray:#6B7280}
body{font-family:'DM Sans',sans-serif;background:var(--navy);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;overflow:hidden;position:relative}
body::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 30% 40%,rgba(0,191,255,.06) 0%,transparent 50%),radial-gradient(circle at 70% 70%,rgba(244,169,0,.07) 0%,transparent 40%);pointer-events:none}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;color:var(--white);margin-bottom:3rem;letter-spacing:.05em}
.logo span{color:var(--gold)}
.checkmark{width:90px;height:90px;background:rgba(244,169,0,.1);border:3px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.8rem;margin:0 auto 2rem;animation:popIn .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,4vw,3rem);color:var(--white);margin-bottom:.8rem;font-weight:800}
h1 span{color:var(--gold)}
p{color:rgba(255,255,255,.55);font-size:1rem;max-width:450px;line-height:1.8;margin-bottom:2rem}
.actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn{padding:.75rem 1.8rem;border-radius:8px;font-weight:600;text-decoration:none;font-size:.95rem;transition:all .25s}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-gold:hover{background:#ffc33d}
.btn-ghost{background:transparent;color:rgba(255,255,255,.6);border:1.5px solid rgba(255,255,255,.2)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.note{margin-top:2.5rem;color:rgba(255,255,255,.3);font-size:.8rem}
.note a{color:var(--gold);text-decoration:none}
.countdown{font-family:'Syne',sans-serif;font-weight:700;color:var(--gold)}
</style>
</head>
<body>
<div class="logo">SELLER <span>RESCUE</span></div>
<div class="checkmark">✓</div>
<h1>Message <span>Sent!</span></h1>
<p>Your message has been received. Syed Hassan Bacha will personally review your case and respond within <strong style="color:rgba(255,255,255,.8)">24 hours</strong>.</p>
<div class="actions">
  <a href="index.html" class="btn btn-gold">Back to Home</a>
  <a href="index.html#services" class="btn btn-ghost">View Services</a>
</div>
<p class="note">Need immediate help? Call or WhatsApp: <a href="tel:+923439737494">+92 343 9737494</a></p>

<script>
// Optional: auto-redirect after 10s
let sec = 10;
const note = document.querySelector('.note');
const timer = setInterval(()=>{
  sec--;
  if(sec<=0){clearInterval(timer);window.location.href='index.html';}
},1000);
</script>
</body>
</html>
